services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-event_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # Stock defaults (shared_buffers=128MB, work_mem=4MB) push the analytical
    # queries' hash aggregates to disk against the 3M-row seed and blow the
    # p95 targets in REQUIREMENTS.md; these values keep the seeded dataset's
    # hot working set in Postgres's own buffer pool instead of round-tripping
    # through disk on every request.
    command: postgres -c shared_buffers=512MB -c effective_cache_size=1GB -c work_mem=32MB -c maintenance_work_mem=256MB
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/seed:/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-event_analytics}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    environment:
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-event_analytics}
      REDIS_URL: redis://redis:6379
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/data:ro

  dashboard:
    build: ./dashboard
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    ports:
      - "${DASHBOARD_PORT:-5173}:5173"
    depends_on:
      - api

volumes:
  pgdata:
